name = "EE598_Cui"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["EE598Cui", "SpatialAudio"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.27.0-rc1"

[[lean_lib]]
name = "EE598Cui"

[[lean_lib]]
name = "SpatialAudio"
srcDir = "project"
